<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Logistics Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div class="logo"><em>&#9632;</em> Logistics Tracker</div>
  <div id="overallStatus" class="overall-status"></div>
  <div class="top-btns">
    <button class="btn accent" id="btnExportAll">Export All</button>
    <button class="btn" id="btnExportLog">Export Logistics</button>
    <button class="btn" id="btnExportCas">Export Cas/Pers</button>
    <button class="btn danger" id="btnReset">Reset</button>
    <button class="btn danger" id="btnResetAll">Reset All</button>
    <button class="btn" id="btnEditMode">Edit Mode</button>
  </div>
</div>

<div id="addBar" class="add-bar" style="display:none">
  <input id="newSecInp" placeholder="New section name (e.g., 1 Section / 2 Section)" autocomplete="off">
  <button class="btn accent" id="btnAddSec">Add section</button>
</div>

<div class="layout">
  <div class="col-hq" id="colHQ"></div>
  <div class="col-secs" id="colSecs">
    <div class="no-secs" id="noSecMsg">No sections yet — add one above.</div>
  </div>
</div>

<div class="footer">Logistics Tracker &bull; Auto-saved to browser &bull; Exports copy to clipboard</div>

<div class="overlay" id="renameOverlay">
  <div class="modal">
    <button class="modal-close" id="btnCloseRename">&#215;</button>
    <div class="modal-title">Rename Section</div>
    <label class="flbl">Section name</label>
    <input class="finp" id="renameInp" autocomplete="off">
    <div class="modal-foot">
      <button class="btn" id="btnCancelRename">Cancel</button>
      <button class="btn accent" id="btnDoRename">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
